<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',system-ui,-apple-system,sans-serif}
body{
  min-height:100vh;display:flex;flex-direction:column;padding:20px 24px;color:#e8e7e3;
  background:
    radial-gradient(circle at 85% 0%, rgba(24,95,165,.32), transparent 45%),
    radial-gradient(circle at 6% 100%, rgba(153,60,29,.26), transparent 45%),
    radial-gradient(circle at 50% 55%, rgba(15,110,86,.18), transparent 55%),
    #0a0b0e;
}

header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;flex-shrink:0}
header .title h1{font-size:19px;font-weight:700;letter-spacing:-.01em;color:#f3f2ee}
header .title p{font-size:11px;color:#7e7d77;margin-top:2px}
.statcluster{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:9px 16px}
.pctbox{font-size:22px;font-weight:800;color:#fff;display:flex;align-items:baseline;flex-shrink:0}
.pctbox span{font-size:11px;color:#9b9a94;margin-left:2px}
.tilegrid{display:grid;grid-template-columns:repeat(20,1fr);grid-template-rows:repeat(5,1fr);gap:2px;width:160px;height:40px;flex-shrink:0}
.sq{border-radius:1.5px;background:rgba(255,255,255,.07)}
.legend{display:flex;flex-direction:column;gap:3px;font-size:9px;color:#9b9a94}
.legend span{display:flex;align-items:center;gap:5px;white-space:nowrap}
.legend i{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}

main.grid2x2{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:14px}
@media (max-width:680px){
  body{min-height:auto;height:auto}
  main.grid2x2{grid-template-columns:1fr}
  .cat-tile{min-height:190px}
}

.cat-tile{
  position:relative;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;
  background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);
  padding:16px 18px;min-height:160px;
}
.cat-tile::before{
  content:'';position:absolute;width:220px;height:220px;border-radius:50%;
  background:var(--glow);opacity:.16;filter:blur(40px);top:-90px;right:-90px;pointer-events:none;
}
.tile-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;position:relative;z-index:2}
.tile-head h2{font-size:13.5px;font-weight:700;color:#f0efeb}
.tile-head .count{font-size:11px;color:#7e7d77}
.icon-grid{flex:1;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:18px;position:relative;z-index:2}
.app-icon{
  background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
  width:74px;color:#cfcdc6;transition:transform .15s ease;padding:0;font-family:inherit;
}
.app-icon:hover{transform:scale(1.09)}
.app-icon:active{transform:scale(.97)}
.app-icon .ico{
  width:56px;height:56px;border-radius:15px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(155deg,var(--cl),var(--c) 55%,var(--cd));
  box-shadow:0 0 0 1px rgba(255,255,255,.08), 0 8px 18px -6px var(--c);
}
.app-icon .ico svg{width:24px;height:24px}
.app-icon .lbl{font-size:10px;text-align:center;line-height:1.25}

.detail-panel{
  position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .2s ease;
  background:#121319;display:flex;border-radius:18px;
}
.cat-tile.show .detail-panel{opacity:1;pointer-events:auto}
.dclose{
  position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:7px;border:none;
  background:rgba(255,255,255,.08);color:#cfcdc6;cursor:pointer;z-index:5;font-size:11px;
}
.dclose:hover{background:rgba(255,255,255,.16)}
.dshot{width:130px;flex-shrink:0;background-size:cover;background-position:top}
.dshot.ph{display:flex;align-items:center;justify-content:center}
.dshot.ph svg{width:32px;height:32px;opacity:.55}
.dinfo{flex:1;min-width:0;padding:16px 30px 14px 16px;display:flex;flex-direction:column;gap:8px;justify-content:center}
.dhead{display:flex;justify-content:space-between;gap:8px}
.dhead h3{font-size:14px;font-weight:700;color:#f3f2ee}
.dpill{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.08);color:#cfcdc6;white-space:nowrap;height:fit-content}
.dinfo p{font-size:11.5px;color:#9b9a94;line-height:1.5}
.dfoot{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.dmeta{font-size:10px;color:#6f6e69}
.dlaunch{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:7px 14px;border-radius:8px;text-decoration:none;background:linear-gradient(135deg,var(--c),#0a0b0e);color:#fff;box-shadow:0 0 14px var(--c)}
@media (max-width:680px){ .detail-panel{flex-direction:column} .dshot{width:100%;height:96px} }
</style>
</head>

  </header>

function svgIcon(key,stroke){
  if (key === 'bolt'){
    return `<svg viewBox="0 0 24 24" fill="${stroke}" stroke="none"><path d="M13 2 4.5 14H11l-1 8 9.5-12H13l1-8z"/></svg>`;
  }
  const p = ICON_PATHS[key] || ICON_PATHS.box;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
}

function renderStats(){
  document.getElementById('pctbox').innerHTML = `<b>${DATA.pct}</b><span>%</span>`;

  const order = [];
  CATORDER.forEach(cat=>{
    const n = DATA.catCounts[cat] || 0;
    for (let i=0;i<n;i++) order.push(DATA.cats[cat].glow);
  });
  let sq = '';
  for (let i=0;i<DATA.total;i++){
    sq += i<order.length
      ? `<div class="sq" style="background:${order[i]};box-shadow:0 0 4px ${order[i]}"></div>`
      : `<div class="sq"></div>`;
  }
  document.getElementById('tilegrid').innerHTML = sq;

  document.getElementById('legend').innerHTML = CATORDER.map(c => `
    <span><i style="background:${DATA.cats[c].glow}"></i>${CATLABEL[c]} ${DATA.catCounts[c]||0}</span>`).join('');
}

function detailHtml(a){
  const cset = DATA.cats[a.cat];
  const media = a.shot
    ? `<div class="dshot" style="background-image:url('${a.shot}')"></div>`
    : `<div class="dshot ph" style="background:linear-gradient(160deg,${cset.cl},${cset.cd})">${svgIcon(a.icon,'#fff')}</div>`;
  return `
    <button class="dclose" data-close aria-label="Close">✕</button>
    ${media}
    <div class="dinfo">
      <div class="dhead"><h3>${a.name}</h3><span class="dpill">${CATLABEL[a.cat]}</span></div>
      <p>${a.desc}</p>
      <div class="dfoot"><span class="dmeta">Updated ${a.last}</span>
        <a class="dlaunch" href="${a.url}" target="_blank" rel="noopener">Launch ↗</a>
      </div>
    </div>`;
}

function renderGrid(){
  const grid = document.getElementById('grid2x2');
  grid.innerHTML = CATORDER.map(cat=>{
    const items = DATA.apps.filter(a=>a.cat===cat);
    const cset = DATA.cats[cat];
    return `
    <section class="cat-tile" data-cat="${cat}" style="--c:${cset.c};--cl:${cset.cl};--cd:${cset.cd};--glow:${cset.glow}">
      <div class="tile-head"><h2>${CATLABEL[cat]}</h2><span class="count">${items.length}</span></div>
      <div class="icon-grid">
        ${items.map(a=>`
          <button class="app-icon" data-slug="${a.slug}" aria-label="${a.name}">
            <span class="ico">${svgIcon(a.icon,'#fff')}</span>
            <span class="lbl">${a.name}</span>
          </button>`).join('')}
      </div>
      <div class="detail-panel"></div>
    </section>`;
  }).join('');

  grid.addEventListener('click', e=>{
    if (e.target.closest('[data-close]')){ closeAll(); return; }
    const icon = e.target.closest('.app-icon');
    if (!icon) return;
    const app = DATA.apps.find(a=>a.slug===icon.dataset.slug);
    const tile = icon.closest('.cat-tile');
    tile.querySelector('.detail-panel').innerHTML = detailHtml(app);
    document.querySelectorAll('.cat-tile').forEach(t=>t.classList.toggle('show', t===tile));
  });
  document.addEventListener('keydown', e=>{ if (e.key==='Escape') closeAll(); });
}
function closeAll(){
  document.querySelectorAll('.cat-tile').forEach(t=>t.classList.remove('show'));
}

renderStats();
renderGrid();
</script>
</body>
</html>
