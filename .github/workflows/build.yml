name: Build Launchpad

on:
  push:
    branches: [main]
    paths:
      - build.js
      - template.html
      - screenshots.js
      - discover.js
      - archive.json
      - .github/workflows/build.yml
  workflow_dispatch:        # manual "Run workflow" button
    inputs:
      archive:
        description: 'Slug to archive & remove (blank = normal build + auto-add)'
        required: false
        default: ''
  schedule:
    - cron: '0 22 * * *'    # daily 22:00 UTC = 06:00 Singapore — auto-add + refresh

permissions:
  contents: write

concurrency:
  group: build-launchpad
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright sharp

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Auto-add new repos (or archive one)
        # With an "archive" input: remove that app + block it from re-adding.
        # Otherwise: scan Pages repos and append any not yet listed (category "New").
        run: |
          if [ -n "${{ github.event.inputs.archive }}" ]; then
            node discover.js --archive "${{ github.event.inputs.archive }}"
          else
            node discover.js --apply
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture screenshots
        # On the daily cron, only screenshot apps that don't have one yet (keeps history quiet
        # but still captures freshly auto-added apps). On push / manual run, re-capture everything.
        run: node screenshots.js ${{ github.event_name == 'schedule' && '--missing-only' || '' }}

      - name: Rebuild index.html
        run: node build.js

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.js archive.json index.html screenshots/thumb
          if git diff --cached --quiet; then
            echo "Nothing changed."
            exit 0
          fi
          git commit -m "chore: auto-rebuild Launchpad (${{ github.event_name }})"
          # Another run may have pushed while we were building — rebase and retry
          # so an overlapping run can never fail on a non-fast-forward push.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected — syncing with remote (attempt $attempt)…"
            git pull --rebase --autostash origin main || true
          done
          echo "Push still failing after 3 attempts." >&2
          exit 1
