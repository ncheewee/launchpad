name: Discover unlisted apps

on:
  schedule:
    - cron: '0 8 * * 1'    # weekly, Monday 08:00 UTC = 16:00 Singapore
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Find Pages repos not yet in the manifest
        run: node discover.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
